<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Item</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.CSS') }}">
</head>
<body>
    <header class="home-topbar">
        <div class="brand">/<span class = "highlighted_search">LOST</span>&FOUND</div>

        <div class="menu-wrapper">
            <button class="menu-btn" id="menuToggle" type="button">☰</button>

            <div class="popup-menu" id="popupMenu">
                <a href="{{ url_for('home') }}">Home</a>
                <a href="{{ url_for('search_page') }}">Search</a>
                <a href="{{ url_for('post_page') }}">Post</a>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="page-intro">
            <p class="eyebrow_search">Search for an Item</p>
            <h2>Enter details to <span class = 'highlighted_search'>find</span> possible matches</h2>
        </section>

        <form class="card form-card" action="{{ url_for('do_search') }}" method="POST" enctype="multipart/form-data">
            <label>Description (optional)</label>
            <textarea name="description" rows="4" placeholder="e.g. Blue school bag with a side pocket"></textarea>

            <label>Color</label>
            <input type="text" name="color" placeholder="e.g. blue">

            <label>Item type</label>
            <input type="text" name="item_type" placeholder="e.g. bag">

            <label>Possible Location</label>
            <input type="text" name="possible_location" placeholder="e.g. JCC">

            <label>Brand</label>
            <input type="text" name="brand" placeholder="e.g. Nike">

            <div class="tag-section">
                <p class="section-label">Special Features</p>

                <div class="tag-category">
                    <button type="button" class="tag-category-btn">Size</button>
                    <div class="tag-group">
                        <span class="tag">large</span>
                        <span class="tag">medium</span>
                        <span class="tag">small</span>
                    </div>
                </div>

                <div class="tag-category">
                    <button type="button" class="tag-category-btn">Appearance</button>
                    <div class="tag-group">
                        <span class="tag">shiny</span>
                        <span class="tag">with stickers</span>
                        <span class="tag">with badge</span>
                    </div>
                </div>

                <div class="tag-category">
                    <button type="button" class="tag-category-btn">Style</button>
                    <div class="tag-group">
                        <span class="tag">cartoon</span>
                    </div>
                </div>

                <input type="hidden" name="selected_tags" id="selected-tags">
            </div>

            <label>Extra Keywords (optional)</label>
            <input type="text" name="keywords" placeholder="e.g. backpack, school bag">

            <label>Contact (for future notifications)</label>
            <input type="text" name="contact" placeholder="email or phone">

            <label>Upload Image (optional)</label>
            <label class="upload-box">
                <input type="file" id="post-image" name="image" accept="image/*" hidden>
                <span class="upload-text">Click to upload image</span>
            </label>

            <button class="btn submit-btn" type="submit">Find Matches</button>
        </form>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
